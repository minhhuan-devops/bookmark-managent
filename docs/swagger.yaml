basePath: /
definitions:
  handler.errorResponse:
    properties:
      error:
        type: string
    type: object
  handler.genPassResponse:
    properties:
      password:
        type: string
    type: object
  handler.shortenURLRequest:
    properties:
      exp_time:
        type: integer
      url:
        type: string
    type: object
  handler.shortenURLResponse:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is a simple bookmark management API.
  title: Bookmark Management API
  version: "1.0"
paths:
  /gen-pass:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.genPassResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Generate Password
      tags:
      - password
  /health-check:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Health Check
      tags:
      - health-check
  /shorten-url:
    post:
      consumes:
      - application/json
      parameters:
      - description: URL to shorten
        in: body
        name: url
        required: true
        schema:
          $ref: '#/definitions/handler.shortenURLRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.shortenURLResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Shorten URL
      tags:
      - URL Shortener
schemes:
- http
swagger: "2.0"
